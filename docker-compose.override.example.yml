# Opt-in Docker read-only integration (v0.3.0+).
# Copy to docker-compose.override.yml — do not commit the override file.
#
# The app runs as user `nextjs` inside the container. The host docker.sock is
# typically root:docker (mode 660), so the container needs the host docker GID:
#   export DOCKER_GID=$(getent group docker | cut -d: -f3)
# Or set DOCKER_GID in .env (see .env.example).

services:
  unihomelabdash:
    group_add:
      - "${DOCKER_GID:-999}"
    volumes:
      - /var/run/docker.sock:/var/run/docker.sock:ro
