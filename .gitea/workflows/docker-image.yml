name: Build Docker Image

on:
  push:
    branches:
      - main
    tags:
      - "v*.*.*"

jobs:
  docker:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Login to Gitea Container Registry
        uses: docker/login-action@v3
        with:
          registry: git.pike.homes
          username: ${{ secrets.REGISTRY_USERNAME }}
          password: ${{ secrets.REGISTRY_TOKEN }}

      - name: Build and push latest
        if: startsWith(gitea.ref, 'refs/heads/main')
        uses: docker/build-push-action@v5
        with:
          context: .
          push: true
          tags: git.pike.homes/alex/unihomelabdash:latest

      - name: Build and push version tag
        if: startsWith(gitea.ref, 'refs/tags/')
        uses: docker/build-push-action@v5
        with:
          context: .
          push: true
          tags: |
            git.pike.homes/alex/unihomelabdash:${{ gitea.ref_name }}
            git.pike.homes/alex/unihomelabdash:latest
