# Builds and pushes UniHomelabDash to the Gitea container registry.
#
# Secrets (repo settings):
#   REGISTRY_USERNAME — Gitea user or bot with package write access
#   REGISTRY_TOKEN    — Gitea token with write:package (or equivalent)
#
# Tags:
#   push to main        → git.pike.homes/alex/unihomelabdash:latest
#   push tag v*.*.*     → :{tag} and :latest (e.g. v0.1.0)

name: Build Docker Image

on:
  push:
    branches:
      - main
    tags:
      - "v*.*.*"

env:
  IMAGE: git.pike.homes/alex/unihomelabdash

jobs:
  docker:
    runs-on: ubuntu-latest
    permissions:
      packages: write

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Login to Gitea Container Registry
        uses: docker/login-action@v3
        with:
          registry: git.pike.homes
          username: ${{ secrets.REGISTRY_USERNAME }}
          password: ${{ secrets.REGISTRY_TOKEN }}

      - name: Build and push latest
        if: startsWith(gitea.ref, 'refs/heads/main')
        uses: docker/build-push-action@v5
        with:
          context: .
          platforms: linux/amd64
          push: true
          tags: ${{ env.IMAGE }}:latest

      - name: Build and push version tag
        if: startsWith(gitea.ref, 'refs/tags/')
        uses: docker/build-push-action@v5
        with:
          context: .
          platforms: linux/amd64
          push: true
          tags: |
            ${{ env.IMAGE }}:${{ gitea.ref_name }}
            ${{ env.IMAGE }}:latest
