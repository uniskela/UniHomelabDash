# Builds and pushes UniHomelabDash to GHCR (and optionally Docker Hub).
# Canonical public image: ghcr.io/uniskela/unihomelabdash
#
# GHCR secrets (optional; falls back to github.actor / github.token):
#   REGISTRY_USERNAME — GitHub username for ghcr.io
#   REGISTRY_TOKEN    — GitHub PAT with write:packages
# Do not create secrets named GITHUB_* — GitHub rejects that prefix.
# Optional Docker Hub secrets:
#   DOCKERHUB_USERNAME — Docker Hub namespace
#   DOCKERHUB_TOKEN    — Docker Hub access token
#
# Tags:
#   push to main        → :latest
#   push tag v*.*.*     → :vX.Y.Z, :X.Y.Z, :latest (e.g. v0.1.0 → v0.1.0, 0.1.0, latest)
#
# After first push: link the GHCR package to this repo (Packages → unihomelabdash →
# Package settings → Connect repository). OCI labels include org.opencontainers.image.source.
#
# First push: enable Settings → Actions → General → Workflow permissions → Read and write.

name: Build Docker Image

on:
  push:
    branches:
      - main
    tags:
      - "v*.*.*"

jobs:
  docker:
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set image names
        env:
          DOCKERHUB_USERNAME: ${{ secrets.DOCKERHUB_USERNAME }}
        run: |
          owner="$(echo "${{ github.repository_owner }}" | tr '[:upper:]' '[:lower:]')"
          echo "GHCR_IMAGE=ghcr.io/${owner}/unihomelabdash" >> "$GITHUB_ENV"
          images="ghcr.io/${owner}/unihomelabdash"
          if [ -n "$DOCKERHUB_USERNAME" ]; then
            images="${images},docker.io/${DOCKERHUB_USERNAME}/unihomelabdash"
            echo "DOCKERHUB_ENABLED=true" >> "$GITHUB_ENV"
          else
            echo "DOCKERHUB_ENABLED=false" >> "$GITHUB_ENV"
          fi
          echo "IMAGES=${images}" >> "$GITHUB_ENV"

      - name: Login to GHCR
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ secrets.REGISTRY_USERNAME != '' && secrets.REGISTRY_USERNAME || github.actor }}
          password: ${{ secrets.REGISTRY_TOKEN != '' && secrets.REGISTRY_TOKEN || github.token }}

      - name: Login to Docker Hub
        if: env.DOCKERHUB_ENABLED == 'true'
        uses: docker/login-action@v3
        with:
          username: ${{ secrets.DOCKERHUB_USERNAME }}
          password: ${{ secrets.DOCKERHUB_TOKEN }}

      - name: Docker metadata
        id: meta
        uses: docker/metadata-action@v5
        with:
          images: ${{ env.IMAGES }}
          tags: |
            type=raw,value=latest,enable=${{ github.ref == 'refs/heads/main' }}
            type=ref,event=tag
            type=semver,pattern={{version}}
            type=raw,value=latest,enable=${{ startsWith(github.ref, 'refs/tags/') }}
          labels: |
            org.opencontainers.image.title=UniHomelabDash
            org.opencontainers.image.description=A self-hosted mobile-first homelab dashboard PWA for manual services, health checks, and future control-plane integrations.
            org.opencontainers.image.source=https://github.com/uniskela/UniHomelabDash
            org.opencontainers.image.documentation=https://github.com/uniskela/UniHomelabDash#readme
            org.opencontainers.image.licenses=MIT
            org.opencontainers.image.vendor=Uniskela
            org.opencontainers.image.url=https://github.com/uniskela/UniHomelabDash

      - name: Build and push
        uses: docker/build-push-action@v5
        with:
          context: .
          platforms: linux/amd64
          push: true
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}
